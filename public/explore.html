<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore — KePolio</title>
  <meta name="description" content="Enter a KEP code to view any student's portfolio instantly." />
  <meta name="author" content="KePolio" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.kepolio.in/explore" />
  <meta property="og:title" content="Explore - KePolio" />
  <meta property="og:description" content="Enter a KEP code to view any student's portfolio instantly." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.kepolio.in/explore" />
  <meta property="og:site_name" content="KePolio" />
  <meta property="og:image" content="https://www.kepolio.in/public/logo/android-chrome-512x512.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@kepolio" />
  <meta name="twitter:title" content="Explore - KePolio" />
  <meta name="twitter:description" content="Enter a KEP code to view any student's portfolio instantly." />
  <meta name="twitter:image" content="https://www.kepolio.in/public/logo/android-chrome-512x512.png" />
  <meta name="theme-color" content="#f7f8f8" />
  <base href="/public/" />
  <link rel="icon" href="/public/logo/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/public/logo/favicon.svg" />
  <link rel="apple-touch-icon" href="/public/logo/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Explore - KePolio",
    "url": "https://www.kepolio.in/explore",
    "description": "Enter a KEP code to view any student's portfolio instantly.",
    "isPartOf": { "@type": "WebSite", "name": "KePolio", "url": "https://www.kepolio.in/" },
    "breadcrumb": {
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://www.kepolio.in/" },
        { "@type": "ListItem", "position": 2, "name": "Explore", "item": "https://www.kepolio.in/explore" }
      ]
    }
  }
  </script>

  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </noscript>

  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/explore.css" />
  <script src="js/theme.js" defer></script>
</head>

<body>
  <div class="explore">
    <div class="explore__content">

      <a href="/" class="explore__logo">
        <span class="logo-k">Ke</span><span class="logo-p">P</span><span class="logo-rest">olio</span>
      </a>

      <h1 class="explore__heading">Enter a KEP Code</h1>
      <p class="explore__subtext">View any student's portfolio instantly</p>

      <div class="explore__input-wrap">
        <input type="text" class="explore__input" id="codeInput" placeholder="e.g. KEP-X7K2P" maxlength="10"
          autocomplete="off" spellcheck="false" />
        <div class="explore__error" id="codeError">Code not found. Check and try again.</div>
      </div>

      <button class="explore__btn" id="viewBtn">
        View Profile
        <span>→</span>
      </button>

      <div class="explore__divider">or share your own KePolio</div>

      <a href="/auth" class="explore__cta-link">Create Your KePolio — Free →</a>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <script src="js/firebase-env.js"></script>
  <script src="js/firebase-config.js" defer></script>
  <script src="js/data-service.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/explore.js" defer></script>
</body>

</html>
